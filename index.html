<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parker OS — System Map</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #08080f;
  --surface: #0f0f1c;
  --surface2: #151524;
  --border: rgba(255,255,255,0.07);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #2a2a40;
  --font: 'Space Grotesk', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; }

body::before {
  content:''; position:fixed; inset:0;
  background-image: radial-gradient(circle,#1c1c38 1px,transparent 1px);
  background-size:28px 28px; opacity:0.4; pointer-events:none; z-index:0;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  position:fixed; top:0; left:0; right:0; height:52px;
  display:flex; align-items:center; gap:14px; padding:0 18px;
  background:rgba(8,8,15,0.88); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border); z-index:200;
}
.logo { font-size:14px; font-weight:700; letter-spacing:.06em; white-space:nowrap; flex-shrink:0; }
.logo span { color:#22c55e; text-shadow:0 0 10px rgba(34,197,94,.5); }
.vdiv { width:1px; height:22px; background:var(--border); flex-shrink:0; }

.filters { display:flex; align-items:center; gap:6px; overflow-x:auto; flex:1; }
.filter-group { display:flex; gap:3px; flex-shrink:0; }

.pill {
  padding:3px 9px; border-radius:999px;
  border:1px solid var(--border); background:transparent;
  color:var(--text-muted); font-family:var(--font); font-size:10.5px;
  font-weight:500; letter-spacing:.03em; cursor:pointer;
  transition:all .14s; white-space:nowrap;
}
.pill:hover { border-color:rgba(255,255,255,.18); color:var(--text); }
.pill.active { color:var(--text); background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.2); }
.pill.active[data-domain="investing"]         { color:#3b82f6; border-color:#3b82f6; }
.pill.active[data-domain="social"]            { color:#a855f7; border-color:#a855f7; }
.pill.active[data-domain="espresso_yourself"] { color:#f59e0b; border-color:#f59e0b; }
.pill.active[data-domain="finance"]           { color:#10b981; border-color:#10b981; }
.pill.active[data-domain="infrastructure"]    { color:#94a3b8; border-color:#94a3b8; }
.pill.active[data-domain="comms"]             { color:#ec4899; border-color:#ec4899; }
.pill.active[data-domain="onboarding"]        { color:#14b8a6; border-color:#14b8a6; }
.pill.active[data-domain="future_ventures"]   { color:#f43f5e; border-color:#f43f5e; }
.pill.active[data-status="autonomous"]    { color:#22c55e; border-color:#22c55e; }
.pill.active[data-status="tested"]        { color:#f97316; border-color:#f97316; }
.pill.active[data-status="needs_testing"] { color:#eab308; border-color:#eab308; }
.pill.active[data-status="broken"]        { color:#ef4444; border-color:#ef4444; }
.pill.active[data-layer="workflow"]       { color:#818cf8; border-color:#818cf8; }
.pill.active[data-layer="systems"]        { color:#cbd5e1; border-color:#cbd5e1; }

.search-wrap { position:relative; flex-shrink:0; }
.search-wrap input {
  width:148px; padding:4px 9px 4px 26px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-family:var(--mono);
  font-size:10.5px; outline:none; transition:border-color .14s;
}
.search-wrap input:focus { border-color:rgba(255,255,255,.2); }
.search-wrap::before {
  content:'⌕'; position:absolute; left:7px; top:50%;
  transform:translateY(-50%); color:var(--text-muted); font-size:12px; pointer-events:none;
}

.header-btn {
  padding:4px 10px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--text-muted); font-family:var(--font);
  font-size:10.5px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:all .14s;
}
.header-btn:hover { border-color:rgba(255,255,255,.2); color:var(--text); }

/* ── Viewport + Canvas ───────────────────────────────────────── */
#viewport {
  position:fixed; top:52px; left:0; right:0; bottom:28px;
  overflow:hidden; cursor:grab; z-index:1;
}
#viewport.grabbing { cursor:grabbing; }

#canvas {
  position:absolute; top:0; left:0;
  transform-origin:0 0;
  will-change:transform;
}

/* ── Swimlane bands ──────────────────────────────────────────── */
.swimlane {
  position:absolute; border-radius:12px;
  border:1px solid;
}
.swimlane-header {
  position:absolute; top:0; left:0; right:0; height:36px;
  display:flex; align-items:center; gap:7px;
  padding:0 12px; border-radius:11px 11px 0 0;
}
.sl-emoji { font-size:13px; line-height:1; }
.sl-name {
  font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
}
.sl-health {
  margin-left:auto; font-size:9.5px; font-family:var(--mono);
  opacity:.6; background:rgba(0,0,0,.3); padding:1px 6px; border-radius:999px;
}

/* ── Column headers ──────────────────────────────────────────── */
.col-hdr {
  position:absolute; font-size:10px; font-weight:600; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text-dim);
  border-bottom:1px solid var(--text-dim); padding-bottom:4px;
}

/* ── Services panel ──────────────────────────────────────────── */
.svc-panel {
  position:absolute; border-radius:12px;
  border:1px solid rgba(255,255,255,.05);
  background:rgba(255,255,255,.015);
}
.svc-panel-title {
  position:absolute; top:0; left:0; right:0; height:36px;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text-dim);
  border-bottom:1px solid rgba(255,255,255,.04);
}

/* ── Node cards ──────────────────────────────────────────────── */
.node-card {
  position:absolute; display:flex; align-items:center; gap:9px;
  border-radius:9px; padding:0 10px 0 0;
  border:1px solid rgba(255,255,255,.07);
  border-left:3px solid;
  background:var(--surface2);
  cursor:pointer; transition:background .12s, box-shadow .12s;
  overflow:hidden; user-select:none;
}
.node-card:hover {
  background:#1c1c30;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  border-color:rgba(255,255,255,.14);
}
.node-card.dimmed { opacity:.07; pointer-events:none; }
.node-card.highlighted { box-shadow:0 0 0 2px rgba(99,102,241,.6), 0 4px 20px rgba(0,0,0,.5); }

.nc-icon {
  width:36px; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0;
  border-right:1px solid rgba(255,255,255,.06);
}
.nc-icon img { width:15px; height:15px; object-fit:contain; }

.nc-body { flex:1; min-width:0; padding:7px 0; }
.nc-label { font-size:11px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nc-meta  { font-size:9px; color:var(--text-muted); margin-top:1px; text-transform:uppercase; letter-spacing:.04em; }

.nc-dot {
  width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-right:2px;
}

/* domain cards (swimlane anchor labels — not rendered) */

/* ── Tooltip ─────────────────────────────────────────────────── */
#tooltip {
  position:fixed; display:none; max-width:268px; z-index:500;
  padding:12px 14px; pointer-events:none;
  background:rgba(8,8,15,.78); backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.1); border-radius:11px;
  box-shadow:0 8px 28px rgba(0,0,0,.65);
}
.tt-head { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.tt-ico { width:26px; height:26px; border-radius:7px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.tt-ico img { width:14px; height:14px; object-fit:contain; }
.tt-title { font-weight:600; font-size:12.5px; color:var(--text); }
.tt-badge {
  margin-left:auto; padding:2px 7px; border-radius:999px;
  font-size:9.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
  border:1px solid currentColor; flex-shrink:0;
}
.badge-autonomous    { color:#22c55e; background:rgba(34,197,94,.08); }
.badge-tested        { color:#f97316; background:rgba(249,115,22,.08); }
.badge-needs_testing { color:#eab308; background:rgba(234,179,8,.08); }
.badge-broken        { color:#ef4444; background:rgba(239,68,68,.08); }
.badge-documented    { color:#818cf8; background:rgba(129,140,248,.08); }
.badge-stub          { color:#c084fc; background:rgba(192,132,252,.08); }
.badge-missing       { color:#64748b; background:rgba(100,116,139,.10); }
.tt-desc { font-size:10.5px; color:var(--text-muted); line-height:1.45; margin-bottom:5px; }
.tt-row  { display:flex; gap:6px; font-size:10px; margin-top:3px; }
.tt-row .lbl { color:var(--text-dim); font-family:var(--mono); min-width:48px; flex-shrink:0; }
.tt-row .val { color:var(--text-muted); font-family:var(--mono); word-break:break-all; }
.tt-notes { margin-top:7px; padding:5px 7px; background:rgba(239,68,68,.07); border-left:2px solid #ef4444; border-radius:4px; font-size:9.5px; color:#fca5a5; }
.tt-cta   { margin-top:7px; font-size:9.5px; color:#6366f1; }

/* ── Legend ──────────────────────────────────────────────────── */
#legend {
  position:fixed; bottom:36px; right:14px;
  background:rgba(8,8,15,.85); backdrop-filter:blur(14px);
  border:1px solid var(--border); border-radius:10px;
  padding:10px 13px; z-index:200; font-size:10.5px;
}
.leg-title { font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:6px; }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; color:var(--text-muted); }
.leg-dot { width:9px; height:9px; border-radius:50%; border:2px solid currentColor; flex-shrink:0; }
.green  { color:#22c55e; } .orange { color:#f97316; } .yellow { color:#eab308; } .red { color:#ef4444; }
.indigo { color:#818cf8; } .violet { color:#c084fc; } .slate { color:#64748b; }
.glow-g { box-shadow:0 0 5px rgba(34,197,94,.55); } .glow-r { box-shadow:0 0 5px rgba(239,68,68,.55); }
.leg-sep { height:1px; background:var(--border); margin:7px 0 6px; }
.leg-dot.dash { border-style:dashed; }

/* ── Stats bar ───────────────────────────────────────────────── */
#statsbar {
  position:fixed; bottom:0; left:0; right:0; height:28px;
  display:flex; align-items:center; padding:0 14px; gap:16px;
  background:rgba(8,8,15,.92); border-top:1px solid var(--border);
  z-index:200; font-family:var(--mono); font-size:9.5px; color:var(--text-dim);
}
.sdot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:3px; vertical-align:middle; }
</style>
</head>
<body>

<header>
  <div class="logo">Parker<span>OS</span> · System Map</div>
  <div class="vdiv"></div>

  <div class="filters">
    <div class="filter-group" id="domain-pills">
      <button class="pill active" data-filter="domain" data-val="all">All</button>
      <button class="pill" data-filter="domain" data-val="onboarding" data-domain="onboarding">Onboarding</button>
      <button class="pill" data-filter="domain" data-val="infrastructure" data-domain="infrastructure">Infra</button>
      <button class="pill" data-filter="domain" data-val="comms" data-domain="comms">Comms</button>
      <button class="pill" data-filter="domain" data-val="social" data-domain="social">Social</button>
      <button class="pill" data-filter="domain" data-val="espresso_yourself" data-domain="espresso_yourself">EY Coffee</button>
      <button class="pill" data-filter="domain" data-val="investing" data-domain="investing">Investing</button>
      <button class="pill" data-filter="domain" data-val="finance" data-domain="finance">Finance</button>
      <button class="pill" data-filter="domain" data-val="future_ventures" data-domain="future_ventures">Ventures</button>
    </div>
    <div class="vdiv"></div>
    <div class="filter-group" id="status-pills">
      <button class="pill active" data-filter="status" data-val="all">All Status</button>
      <button class="pill" data-filter="status" data-val="autonomous" data-status="autonomous">Autonomous</button>
      <button class="pill" data-filter="status" data-val="tested" data-status="tested">Tested</button>
      <button class="pill" data-filter="status" data-val="needs_testing" data-status="needs_testing">Needs Test</button>
      <button class="pill" data-filter="status" data-val="broken" data-status="broken">Broken</button>
    </div>
    <div class="vdiv"></div>
    <div class="filter-group" id="layer-pills">
      <button class="pill active" data-filter="layer" data-val="all">All Layers</button>
      <button class="pill" data-filter="layer" data-val="workflow" data-layer="workflow">Workflows</button>
      <button class="pill" data-filter="layer" data-val="systems" data-layer="systems">Systems</button>
    </div>
    <div class="vdiv"></div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search nodes…" autocomplete="off" spellcheck="false">
    </div>
    <div class="vdiv"></div>
    <button class="header-btn" id="fit-btn">⊡ Fit All</button>
  </div>
</header>

<div id="viewport">
  <div id="canvas">
    <svg id="edges-svg" style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible"></svg>
    <div id="bg-layer"></div>
    <div id="node-layer"></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="legend">
  <div class="leg-title">Execution</div>
  <div class="leg-row"><div class="leg-dot green glow-g"></div> Autonomous</div>
  <div class="leg-row"><div class="leg-dot orange"></div> Tested</div>
  <div class="leg-row"><div class="leg-dot yellow"></div> Needs Testing</div>
  <div class="leg-row"><div class="leg-dot red glow-r"></div> Broken</div>
  <div class="leg-sep"></div>
  <div class="leg-title">Workflows</div>
  <div class="leg-row"><div class="leg-dot indigo"></div> Documented</div>
  <div class="leg-row"><div class="leg-dot violet"></div> Stub</div>
  <div class="leg-row"><div class="leg-dot slate dash"></div> Missing</div>
</div>

<div id="statsbar">
  <span id="st-nodes">—</span>
  <span id="st-edges">—</span>
  <span>
    <span class="sdot" style="background:#22c55e;box-shadow:0 0 4px #22c55e"></span><span id="st-auto">0</span>
    &thinsp;<span class="sdot" style="background:#f97316"></span><span id="st-tested">0</span>
    &thinsp;<span class="sdot" style="background:#eab308"></span><span id="st-needs">0</span>
    &thinsp;<span class="sdot" style="background:#ef4444"></span><span id="st-broken">0</span>
  </span>
  <span id="st-ts" style="margin-left:auto"></span>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────
const STATUS_COLOR = { autonomous:'#22c55e', tested:'#f97316', needs_testing:'#eab308', broken:'#ef4444' };
// Workflow doc-states — distinct blue/violet/slate family, never confused with execution rings
const WF_STATUS_COLOR = { documented:'#818cf8', stub:'#c084fc', missing:'#64748b' };
const WF_STATUSES = ['documented','stub','missing'];
const DOMAIN_COLOR = {
  investing:'#3b82f6', social:'#a855f7', espresso_yourself:'#f59e0b',
  finance:'#10b981', infrastructure:'#64748b', comms:'#ec4899',
  onboarding:'#14b8a6', future_ventures:'#f43f5e'
};
const DOMAIN_ICON  = { investing:'📈', social:'📱', espresso_yourself:'☕', finance:'💰', infrastructure:'⚙️', comms:'✉️', onboarding:'🧭', future_ventures:'🚀' };
const DOMAIN_LABEL = { investing:'Investing', social:'Social / Brand', espresso_yourself:'Espresso Yourself', finance:'Finance', infrastructure:'Infrastructure', comms:'Comms', onboarding:'Onboarding', future_ventures:'Future Ventures' };
const DOMAIN_ORDER = ['investing','social','espresso_yourself','finance','infrastructure','comms','onboarding','future_ventures'];
// Horizontal display order (left → right) by importance
const DOMAIN_ORDER_DISPLAY = ['onboarding','infrastructure','comms','social','espresso_yourself','investing','finance','future_ventures'];

// Layout — tree mode: workflow → auto → tools → services, each branch self-contained
const NODE_W = 182, NODE_H = 48, ROW_H = 60;
const AUTO_GAP = 12;   // px gap between automation groups in a domain
const DOMAIN_COL_GAP = 18; // horizontal gap between domain swimlanes
const LANE_TOP = 40, LANE_BOT = 22;
const PAD_X = 20, PAD_TOP = 52;

const COL_LABEL_W = 118, COL_GAP = 14;
const COL_LABEL_X = PAD_X;
const COL_WF_X    = COL_LABEL_X + COL_LABEL_W + COL_GAP;  // 152  — Workflows (WAT instructions layer)
const COL_TASK_X  = COL_WF_X    + NODE_W + COL_GAP;        // 348  — Automations
const COL_TOOL_X  = COL_TASK_X  + NODE_W + COL_GAP;        // 544  — Tools
const COL_SVC_X   = COL_TOOL_X  + NODE_W + COL_GAP;        // 740  — Services
const HALF_W      = COL_SVC_X   + NODE_W + PAD_X;          // 942
// Total canvas width: all domain columns side-by-side with gaps
const CANVAS_W    = DOMAIN_ORDER_DISPLAY.length * HALF_W + (DOMAIN_ORDER_DISPLAY.length - 1) * DOMAIN_COL_GAP;

// ── State ──────────────────────────────────────────────────────
let pan = { x: 24, y: 24 }, zoom = 0.8;
let dragging = false, dragStart = { x:0, y:0 }, panStart = { x:0, y:0 };
let activeFilter = { domain:'all', status:'all', layer:'all' };
let allNodes = [], nodeById = {};
let dispNodes = [], dispEdges = [];

// ── Helpers ───────────────────────────────────────────────────
const hex2rgba = (h,a) => { const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };
const $ = id => document.getElementById(id);

// ── Build expanded display graph ──────────────────────────────
// Four-tier tree per domain: workflow → automation → tool → service.
// Each node is duplicated per parent branch (intentional) via compound display IDs.
// Workflows are the WAT "instructions" roots; automations/tools that no workflow
// references render as orphans starting in their own column.
function buildDisplayGraph(nodes, edges) {
  const depOf = {};
  for (const e of edges) (depOf[e.from] = depOf[e.from]||[]).push(e.to);

  const byDomain = {};
  for (const d of DOMAIN_ORDER) byDomain[d] = { workflows:[], autos:[], tools:[] };

  for (const n of nodes) {
    if (n.type === 'domain') continue;
    const d = n.domain;
    if (!d || !byDomain[d]) continue;
    if (n.type === 'workflow') byDomain[d].workflows.push(n);
    else if (n.type === 'trigger_task') byDomain[d].autos.push(n);
    else if (['tool','api_bridge'].includes(n.type)) byDomain[d].tools.push(n);
  }

  const dNodes = [], dEdges = [];

  function addNode(original, displayId, domainOverride) {
    dNodes.push({ ...original, id: displayId, originalId: original.id, domain: domainOverride || original.domain });
  }

  for (const d of DOMAIN_ORDER) {
    const { workflows, autos, tools } = byDomain[d];
    const claimedToolIds = new Set();
    const claimedAutoIds = new Set();

    // Expand a tool instance under a parent, plus its service children
    function expandTool(tool, parentInst) {
      const tInst = `${tool.id}::${parentInst}`;
      addNode(tool, tInst, d);
      dEdges.push({ from: parentInst, to: tInst });
      const svcDeps = (depOf[tool.id]||[]).map(id => nodeById[id]).filter(n => n?.type === 'service');
      for (const svc of svcDeps) {
        const sInst = `${svc.id}::${tInst}`;
        addNode(svc, sInst, d);
        dEdges.push({ from: tInst, to: sInst });
      }
    }

    // Expand an automation instance (optionally under a workflow), plus its tool/service children
    function expandAuto(auto, parentInst) {
      const aInst = parentInst ? `${auto.id}::${parentInst}` : auto.id;
      addNode(auto, aInst, d);
      if (parentInst) dEdges.push({ from: parentInst, to: aInst });

      const deps = (depOf[auto.id]||[]).map(id => nodeById[id]);
      for (const tool of deps.filter(n => n && ['tool','api_bridge'].includes(n.type))) {
        claimedToolIds.add(tool.id);
        expandTool(tool, aInst);
      }
      for (const svc of deps.filter(n => n?.type === 'service')) {
        const sInst = `${svc.id}::${aInst}::d`;
        addNode(svc, sInst, d);
        dEdges.push({ from: aInst, to: sInst });
      }
    }

    // 1. Workflows are the roots — branch to their automations and/or tools
    for (const wf of workflows) {
      addNode(wf, wf.id, d);   // workflows keep their real ID (globally unique)
      const deps = (depOf[wf.id]||[]).map(id => nodeById[id]);
      for (const auto of deps.filter(n => n?.type === 'trigger_task')) {
        claimedAutoIds.add(auto.id);
        expandAuto(auto, wf.id);
      }
      for (const tool of deps.filter(n => n && ['tool','api_bridge'].includes(n.type))) {
        claimedToolIds.add(tool.id);
        expandTool(tool, wf.id);
      }
    }

    // 2. Orphan automations: no workflow references them — start in the Automations column
    for (const auto of autos) {
      if (claimedAutoIds.has(auto.id)) continue;
      expandAuto(auto, null);
    }

    // 3. Orphan tools: referenced by no workflow or automation — start in the Tools column
    for (const tool of tools) {
      if (claimedToolIds.has(tool.id)) continue;
      const tInst = `${tool.id}::orphan`;
      addNode(tool, tInst, d);
      const svcDeps = (depOf[tool.id]||[]).map(id => nodeById[id]).filter(n => n?.type === 'service');
      for (const svc of svcDeps) {
        const sInst = `${svc.id}::${tInst}`;
        addNode(svc, sInst, d);
        dEdges.push({ from: tInst, to: sInst });
      }
    }
  }

  return { dNodes, dEdges };
}

// ── Per-domain pixel-based tree layout ────────────────────────
// Four-tier recursion: workflow → automation → tool → service.
// Each node is centered vertically over the union of its descendants;
// leaves consume one ROW_H. Returns positions keyed by display ID (y relative to band origin).
function layoutDomainPx(domNodes, xOff, depOf) {
  const pos = {};
  let py = 0;

  const nodeByInst = {};
  for (const n of domNodes) nodeByInst[n.id] = n;

  // x column for each tier
  function colXFor(type) {
    if (type === 'workflow')     return xOff + COL_WF_X;
    if (type === 'trigger_task') return xOff + COL_TASK_X;
    if (type === 'service')      return xOff + COL_SVC_X;
    return xOff + COL_TOOL_X;  // tool, api_bridge
  }

  // Recursively place a subtree; node centers over its children's block
  function place(inst) {
    const node  = nodeByInst[inst];
    const startY = py;
    const kids = (depOf[inst]||[]).map(id => nodeByInst[id]).filter(Boolean);

    if (kids.length === 0) {
      pos[inst] = { x: colXFor(node.type), y: py + (ROW_H - NODE_H) / 2 };
      py += ROW_H;
    } else {
      kids.forEach(k => place(k.id));
      const blockH = py - startY;
      pos[inst] = { x: colXFor(node.type), y: startY + (blockH - NODE_H) / 2 };
    }
  }

  // Roots = nodes with no parent edge, ordered workflow → automation → tool
  const hasParent = new Set();
  for (const n of domNodes) for (const c of (depOf[n.id]||[])) hasParent.add(c);
  const ROOT_RANK = { workflow:0, trigger_task:1, api_bridge:2, tool:2, service:3 };
  const roots = domNodes
    .filter(n => !hasParent.has(n.id))
    .sort((a, b) => (ROOT_RANK[a.type] ?? 9) - (ROOT_RANK[b.type] ?? 9));

  for (let i = 0; i < roots.length; i++) {
    place(roots[i].id);
    if (i < roots.length - 1) py += AUTO_GAP;
  }

  return { pos, totalPx: py };
}

// ── Main layout: single horizontal strip of domain columns ────
function computeLayout(dNodes, dEdges) {
  const depOf = {};
  for (const e of dEdges) (depOf[e.from] = depOf[e.from]||[]).push(e.to);

  const byDomain = {};
  for (const d of DOMAIN_ORDER) byDomain[d] = [];
  for (const n of dNodes) {
    if (n.domain && byDomain[n.domain]) byDomain[n.domain].push(n);
  }

  // Lay out each domain column; track the x offset as we move right
  const domainResults = {};
  let cx = 0;
  for (const d of DOMAIN_ORDER_DISPLAY) {
    domainResults[d] = { res: layoutDomainPx(byDomain[d] || [], cx, depOf), xOff: cx };
    cx += HALF_W + DOMAIN_COL_GAP;
  }

  // All domains share the same band height (tallest domain wins)
  const maxPx = Math.max(...Object.values(domainResults).map(dl => dl.res.totalPx), ROW_H);
  const bandH = LANE_TOP + maxPx + LANE_BOT;

  const pos = {}, bands = [];
  for (const d of DOMAIN_ORDER_DISPLAY) {
    const { res, xOff } = domainResults[d];
    for (const [id, p] of Object.entries(res.pos)) {
      pos[id] = { x: p.x, y: PAD_TOP + LANE_TOP + p.y };
    }
    bands.push({ domain:d, y:PAD_TOP, h:bandH, xOff });
  }

  const totalH = PAD_TOP + bandH + 20;
  return { pos, bands, totalH };
}

// ── Render swimlanes + column headers ────────────────────────
function renderBackground(bands, totalH) {
  const bg = $('bg-layer');
  bg.innerHTML = '';

  // Each band draws its own sub-column headers and services panel
  for (const band of bands) {
    const xOff = band.xOff;
    for (const { label, x } of [
      { label:'Workflows',   x: xOff + COL_WF_X   },
      { label:'Automations', x: xOff + COL_TASK_X },
      { label:'Tools',       x: xOff + COL_TOOL_X },
      { label:'Services',    x: xOff + COL_SVC_X  },
    ]) {
      const hdr = document.createElement('div');
      hdr.className = 'col-hdr';
      hdr.style.cssText = `left:${x}px;top:${PAD_TOP-26}px;width:${NODE_W}px`;
      hdr.textContent = label;
      bg.appendChild(hdr);
    }
    const sp = document.createElement('div');
    sp.className = 'svc-panel';
    sp.style.cssText = `left:${xOff+COL_SVC_X-10}px;top:${PAD_TOP-10}px;width:${NODE_W+20}px;height:${totalH-PAD_TOP+10}px`;
    bg.appendChild(sp);
  }

  // Swimlane bands
  for (const band of bands) {
    const dc = DOMAIN_COLOR[band.domain];
    const el = document.createElement('div');
    el.className = 'swimlane';
    el.dataset.domain = band.domain;
    const bandLeft  = band.xOff + COL_LABEL_X;
    const bandWidth = COL_SVC_X - COL_LABEL_X + NODE_W + 8;
    el.style.cssText = `left:${bandLeft}px;top:${band.y}px;width:${bandWidth}px;height:${band.h}px`;
    el.style.background = hex2rgba(dc, 0.035);
    el.style.borderColor = hex2rgba(dc, 0.15);

    // Workflows are docs, not executing nodes — excluded from the autonomous health math
    const execNodes = allNodes.filter(n => n.domain === band.domain && n.type !== 'domain' && n.type !== 'workflow');
    const autoCount = execNodes.filter(n => n.status==='autonomous').length;
    const health    = execNodes.length ? `${autoCount}/${execNodes.length} auto` : 'docs only';

    el.innerHTML = `
      <div class="swimlane-header">
        <span class="sl-emoji">${DOMAIN_ICON[band.domain]||'◎'}</span>
        <span class="sl-name" style="color:${dc}">${DOMAIN_LABEL[band.domain]}</span>
        <span class="sl-health">${health}</span>
      </div>`;
    bg.appendChild(el);
  }
}

// ── Render node cards ─────────────────────────────────────────
function renderNodes(nodes, pos) {
  const layer = $('node-layer');
  layer.innerHTML = '';

  for (const n of nodes) {
    if (n.type === 'domain') continue;
    const p = pos[n.id];
    if (!p) continue;

    const isWf = n.type === 'workflow';
    // Workflows use the doc-state palette; everything else uses execution status colors
    const sc = isWf ? (WF_STATUS_COLOR[n.status] || '#64748b') : (STATUS_COLOR[n.status] || '#475569');
    const dc = DOMAIN_COLOR[n.domain]  || '#475569';

    const iconHtml = n.icon_url
      ? `<img src="${n.icon_url}" width="15" height="15" onerror="this.outerHTML='<span>${(n.icon_value||'').slice(0,2)}</span>'">`
      : `<span>${n.icon_type==='emoji' ? n.icon_value : (n.icon_value||'--').slice(0,2)}</span>`;

    const card = document.createElement('div');
    card.className = 'node-card' + (isWf ? ' wf-card' : '');
    card.dataset.id         = n.id;
    card.dataset.originalId = n.originalId || n.id;
    card.dataset.domain     = n.domain;
    card.dataset.status     = n.status;
    card.dataset.type       = n.type;
    // Missing-doc workflows render hollow/dashed to read as a gap
    const dashed = (isWf && n.status === 'missing') ? 'border-style:dashed;opacity:.72;' : '';
    card.style.cssText  = `left:${p.x}px;top:${p.y}px;width:${NODE_W}px;height:${NODE_H}px;border-left-color:${sc};${dashed}`;

    card.innerHTML = `
      <div class="nc-icon" style="background:${hex2rgba(dc,.12)};color:${hex2rgba(dc,.9)}">${iconHtml}</div>
      <div class="nc-body">
        <div class="nc-label">${n.label}</div>
        <div class="nc-meta">${n.type.replace(/_/g,' ')}</div>
      </div>
      <div class="nc-dot" style="background:${sc};box-shadow:0 0 5px ${sc}88"></div>`;

    card.addEventListener('mouseenter', e => showTip(n, e));
    card.addEventListener('mousemove',  e => moveTip(e));
    card.addEventListener('mouseleave', hideTip);
    card.addEventListener('click', e => { e.stopPropagation(); handleClick(n); });
    layer.appendChild(card);
  }
}

// ── Render SVG edges ──────────────────────────────────────────
function renderEdges(edges, pos, dNodes) {
  const svg = $('edges-svg');
  svg.innerHTML = `
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0.5 L6,3.5 L0,6.5" fill="none" stroke="rgba(99,102,241,0.55)" stroke-width="1.2"/>
      </marker>
    </defs>`;

  const TYPE_COL = { workflow:1, trigger_task:2, api_bridge:3, tool:3, service:4 };
  const nodeType = {};
  for (const n of dNodes) nodeType[n.id] = n.type;

  const drawn = new Set();

  for (const e of edges) {
    const fp = pos[e.from], tp = pos[e.to];
    if (!fp || !tp) continue;

    const fc = TYPE_COL[nodeType[e.from]] || 0;
    const tc = TYPE_COL[nodeType[e.to]]   || 0;
    if (fc >= tc) continue;   // only forward edges (left → right)

    const key = `${e.from}→${e.to}`;
    if (drawn.has(key)) continue;
    drawn.add(key);

    const x1 = fp.x + NODE_W, y1 = fp.y + NODE_H/2;
    const x2 = tp.x,           y2 = tp.y + NODE_H/2;
    const mx = (x1+x2)/2;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(99,102,241,0.3)');
    path.setAttribute('stroke-width','1.4');
    path.setAttribute('marker-end','url(#arr)');
    path.dataset.from = e.from;
    path.dataset.to   = e.to;
    svg.appendChild(path);
  }
}

// ── Pan & Zoom ────────────────────────────────────────────────
function applyTransform() {
  $('canvas').style.transform = `translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
}

function fitAll(totalH) {
  const vw = $('viewport').offsetWidth, vh = $('viewport').offsetHeight;
  const scaleX = (vw - 48) / CANVAS_W;
  const scaleH = (vh - 48) / totalH;
  zoom = Math.min(scaleX, scaleH, 1.0);
  pan.x = Math.max(24, (vw - CANVAS_W * zoom) / 2);
  pan.y = 24;
  applyTransform();
}

function setupPanZoom(totalH) {
  const vp = $('viewport');

  vp.addEventListener('mousedown', e => {
    if (e.button !== 0 || e.target !== vp && e.target !== $('canvas') && e.target.id !== 'bg-layer') return;
    dragging = true;
    dragStart = { x:e.clientX, y:e.clientY };
    panStart  = { x:pan.x, y:pan.y };
    vp.classList.add('grabbing');
    // deselect highlight
    clearHighlight();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    pan.x = panStart.x + (e.clientX - dragStart.x);
    pan.y = panStart.y + (e.clientY - dragStart.y);
    applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; $('viewport').classList.remove('grabbing'); });

  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.88 : 1/0.88;
    const nz = Math.min(Math.max(zoom * delta, 0.15), 3);
    pan.x = mx - (mx - pan.x) * (nz / zoom);
    pan.y = my - (my - pan.y) * (nz / zoom);
    zoom = nz;
    applyTransform();
  }, { passive:false });

  $('fit-btn').addEventListener('click', () => fitAll(totalH));

  // Click on empty canvas = clear highlight
  $('canvas').addEventListener('click', clearHighlight);
}

// ── Highlight ─────────────────────────────────────────────────
let highlighted = null;

function handleClick(n) {
  if (n.github_url) { window.open(n.github_url,'_blank'); return; }
  if (highlighted === n.id) { clearHighlight(); return; }
  highlighted = n.id;

  // Find connected node ids
  const connected = new Set([n.id]);
  for (const e of $('edges-svg').querySelectorAll('path[data-from]')) {
    if (e.dataset.from === n.id) connected.add(e.dataset.to);
    if (e.dataset.to   === n.id) connected.add(e.dataset.from);
  }

  // Dim non-connected cards
  for (const card of $('node-layer').querySelectorAll('.node-card')) {
    if (connected.has(card.dataset.id)) card.classList.remove('dimmed');
    else card.classList.add('dimmed');
    card.classList.toggle('highlighted', card.dataset.id === n.id);
  }

  // Highlight/dim edges
  for (const path of $('edges-svg').querySelectorAll('path[data-from]')) {
    const edgeConnected = connected.has(path.dataset.from) && connected.has(path.dataset.to);
    path.setAttribute('stroke', edgeConnected ? 'rgba(99,102,241,0.7)' : 'rgba(99,102,241,0.06)');
    path.setAttribute('stroke-width', edgeConnected ? '2' : '0.8');
  }
}

function clearHighlight() {
  highlighted = null;
  for (const card of $('node-layer').querySelectorAll('.node-card'))
    card.classList.remove('dimmed','highlighted');
  for (const path of $('edges-svg').querySelectorAll('path[data-from]')) {
    path.setAttribute('stroke','rgba(99,102,241,0.3)');
    path.setAttribute('stroke-width','1.4');
  }
}

// ── Filters ────────────────────────────────────────────────────
function applyFilters() {
  const { domain, status, layer } = activeFilter;
  const searchQ = $('search').value.toLowerCase().trim();

  for (const card of $('node-layer').querySelectorAll('.node-card')) {
    const dm = card.dataset.domain, st = card.dataset.status, ty = card.dataset.type;
    const isWf = ty === 'workflow';
    const n  = nodeById[card.dataset.originalId] || {};
    const domainOk  = domain === 'all' || dm === domain;
    // Execution-status filter never applies to workflows (their statuses are doc-states)
    const statusOk  = status === 'all' || isWf || st === status;
    const layerOk   = layer === 'all' || (layer === 'workflow' ? isWf : !isWf);
    const searchOk  = !searchQ || (n.label||'').toLowerCase().includes(searchQ) || (n.description||'').toLowerCase().includes(searchQ);
    card.classList.toggle('dimmed', !(domainOk && statusOk && layerOk && searchOk));
  }

  // Dim edges if either endpoint is dimmed
  for (const path of $('edges-svg').querySelectorAll('path[data-from]')) {
    const fd = $('node-layer').querySelector(`[data-id="${path.dataset.from}"]`);
    const td = $('node-layer').querySelector(`[data-id="${path.dataset.to}"]`);
    const show = fd && !fd.classList.contains('dimmed') && td && !td.classList.contains('dimmed');
    path.setAttribute('stroke', show ? 'rgba(99,102,241,0.3)' : 'rgba(99,102,241,0.04)');
  }
}

function setupFilters() {
  for (const pill of document.querySelectorAll('.pill')) {
    pill.addEventListener('click', () => {
      const type = pill.dataset.filter, val = pill.dataset.val;
      pill.closest('.filter-group').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeFilter[type] = val;
      clearHighlight();
      applyFilters();
    });
  }
  $('search').addEventListener('input', () => { clearHighlight(); applyFilters(); });
}

// ── Tooltip ────────────────────────────────────────────────────
let tipTimer = null;
const tip = $('tooltip');

function showTip(n, e) {
  clearTimeout(tipTimer);
  tipTimer = setTimeout(() => {
    const sc = STATUS_COLOR[n.status] || '#475569';
    const iconHtml = n.icon_url
      ? `<img src="${n.icon_url}" width="14" height="14" onerror="this.style.display='none'">`
      : `<span style="font-size:12px">${n.icon_type==='emoji'?n.icon_value:(n.icon_value||'').slice(0,2)}</span>`;
    const statusLabel = { autonomous:'Autonomous', tested:'Tested', needs_testing:'Needs Testing', broken:'Broken', documented:'Documented', stub:'Stub', missing:'Missing SOP' };
    const countdown = getCountdown(n.schedule);

    tip.innerHTML = `
      <div class="tt-head">
        <div class="tt-ico">${iconHtml}</div>
        <div class="tt-title">${n.label}</div>
        <span class="tt-badge badge-${n.status}">${statusLabel[n.status]||n.status}</span>
      </div>
      <div class="tt-desc">${n.description||''}</div>
      ${n.schedule?`<div class="tt-row"><span class="lbl">schedule</span><span class="val">${n.schedule}</span></div>`:''}
      ${countdown?`<div class="tt-row"><span class="lbl">next run</span><span class="val" style="color:#818cf8">${countdown}</span></div>`:''}
      ${n.file_path?`<div class="tt-row"><span class="lbl">path</span><span class="val" style="color:#6366f1">${n.file_path}</span></div>`:''}
      ${n.notes?`<div class="tt-notes">⚠ ${n.notes}</div>`:''}
      ${n.github_url?`<div class="tt-cta">↗ Click to open on GitHub</div>`:''}`;
    tip.style.display = 'block';
    moveTip(e);
  }, 100);
}
function moveTip(e) {
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let tx = e.clientX + 14, ty = e.clientY - 10;
  if (tx + tw > window.innerWidth  - 8) tx = e.clientX - tw - 14;
  if (ty + th > window.innerHeight - 36) ty = window.innerHeight - th - 36;
  if (ty < 58) ty = 58;
  tip.style.left = tx+'px'; tip.style.top = ty+'px';
}
function hideTip() { clearTimeout(tipTimer); tipTimer = setTimeout(() => tip.style.display='none', 120); }

function getCountdown(schedule) {
  if (!schedule) return null;
  const m = schedule.match(/(\d{1,2}):(\d{2})\s*(AM|PM)\s*ET/i);
  if (!m) return null;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  if (m[3].toUpperCase()==='PM' && h!==12) h+=12;
  if (m[3].toUpperCase()==='AM' && h===12) h=0;
  const now = new Date();
  const et = new Date(now.getTime() + (now.getTimezoneOffset() + (-4)*60)*60000);
  const tgt = new Date(et); tgt.setHours(h,min,0,0);
  if (tgt <= et) tgt.setDate(tgt.getDate()+1);
  if (schedule.toLowerCase().includes('mon')) {
    while([0,6].includes(tgt.getDay())) tgt.setDate(tgt.getDate()+1);
  }
  const diff = tgt - et;
  return `in ${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}m`;
}

// ── Stats bar ──────────────────────────────────────────────────
function updateStats(meta, runtimeMeta) {
  $('st-nodes').textContent = `${meta.node_count||0} nodes`;
  $('st-edges').textContent = `${meta.edge_count||0} edges`;
  // Recount from allNodes so runtime overrides are reflected
  const sc = {};
  for (const n of allNodes) sc[n.status] = (sc[n.status]||0) + 1;
  $('st-auto').textContent   = sc.autonomous    || 0;
  $('st-tested').textContent = sc.tested        || 0;
  $('st-needs').textContent  = sc.needs_testing || 0;
  $('st-broken').textContent = sc.broken        || 0;
  if (runtimeMeta?.updated_at) {
    const ts   = new Date(runtimeMeta.updated_at);
    const mins = Math.round((Date.now() - ts) / 60000);
    const ago  = mins < 2 ? 'just now' : mins < 60 ? `${mins}m ago` : `${Math.floor(mins/60)}h ago`;
    const el   = $('st-ts');
    el.textContent = `synced ${ago}`;
    el.title       = `Last sync: ${ts.toLocaleString()}`;
    el.style.color = '#22c55e';
  } else if (meta.generated_at) {
    const ts = new Date(meta.generated_at);
    $('st-ts').textContent = `map built ${ts.toLocaleDateString()} ${ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  let data;
  try {
    const r = await fetch('data/map.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch(e) {
    $('viewport').innerHTML = `<div style="color:#ef4444;padding:48px 32px;font-family:monospace;font-size:13px">
      Failed to load data/map.json<br><br>Run: python3 tools/system_map/generate_map.py<br><br>${e.message}</div>`;
    return;
  }

  allNodes = data.nodes;
  for (const n of allNodes) nodeById[n.id] = n;

  // Apply runtime status overrides (pushed by system-map-update task at 5:30 AM/PM)
  let runtimeMeta = null;
  try {
    const rr = await fetch('data/runtime_status.json');
    if (rr.ok) {
      runtimeMeta = await rr.json();
      const overrides = runtimeMeta.statuses || {};
      let overrideCount = 0;
      for (const n of allNodes) {
        if (overrides[n.id] && overrides[n.id] !== n.status) {
          n.status = overrides[n.id];
          overrideCount++;
        }
      }
      if (overrideCount) console.log(`[system-map] Applied ${overrideCount} runtime status override(s)`);
    }
  } catch(_) { /* runtime_status.json is optional */ }

  updateStats(data.meta || {}, runtimeMeta);

  const { dNodes, dEdges } = buildDisplayGraph(allNodes, data.edges || []);
  dispNodes = dNodes;
  dispEdges = dEdges;

  const { pos, bands, totalH } = computeLayout(dispNodes, dispEdges);

  $('canvas').style.width  = CANVAS_W + 'px';
  $('canvas').style.height = totalH   + 'px';
  $('edges-svg').setAttribute('width',  CANVAS_W);
  $('edges-svg').setAttribute('height', totalH);

  renderBackground(bands, totalH);
  renderNodes(dispNodes, pos);
  renderEdges(dispEdges, pos, dispNodes);

  setupPanZoom(totalH);
  setupFilters();

  // Start zoomed to fit the full width so all domain columns are visible
  const vw = $('viewport').offsetWidth, vh = $('viewport').offsetHeight;
  zoom = Math.min((vw - 48) / CANVAS_W, (vh - 48) / totalH, 1.0);
  pan.x = Math.max(12, (vw - CANVAS_W * zoom) / 2);
  pan.y = 12;
  applyTransform();
}

init();
</script>
